<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Birthday Surprise ❤️</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- PAGE 1 -->

    <section id="page1">

        <div id="qrBox">

            <img src="images/qr.png"
                 id="qrImage">

            <div class="scan-line"></div>

        </div>

        <p class="tap-text">

            Tap

            <span id="scanLink"
                  onclick="showBirthday()">

                HERE

            </span>

            to Scan the QR

        </p>

    </section>

    <!-- PAGE 2 -->

    <section id="page2">

        <h1 id="birthdayText">

            Happy Birthday
            <span>❤️ Anu ❤️</span>

        </h1>

        <img src="images/teddy-cake.png"
             id="teddyImage">

        <div id="questionSection">

            <p>

                Are you excited for what's next?

            </p>

            <div class="btn-container">

                <button id="yesBtn">

                    YES

                </button>

                <button id="noBtn">

                    NO

                </button>

            </div>

        </div>

    </section>

   <!-- =========================
     PAGE 3 - BALLOON GAME
========================= -->
<section id="page3">

    <h2 id="balloonTitle">Pop the Balloons 🎈</h2>

    <div id="balloonWrapper">

        <!-- BALLOON 1 -->
        <div class="balloon" id="b1">
            <img src="images/balloon-1.png" alt="balloon1">
        </div>

        <!-- BALLOON 2 -->
        <div class="balloon" id="b2">
            <img src="images/balloon-2.png" alt="balloon2">
        </div>

        <!-- BALLOON 3 -->
        <div class="balloon" id="b3">
            <img src="images/balloon-3.png" alt="balloon3">
        </div>

        <!-- BALLOON 4 -->
        <div class="balloon" id="b4">
            <img src="images/balloon-4.png" alt="balloon4">
        </div>

        <!-- HIDDEN TEXT -->
        <div id="hiddenText">
            <div id="t1"></div>
            <div id="t2"></div>
            <div id="t3"></div>
            <div id="t4"></div>
        </div>

    </div>

    <!-- MESSAGE BELOW BALLOONS -->
    <div id="nextMsg">
        Some little things are waiting for you...<br>
        Please tap to explore them.
    </div>

</section>

<!-- =========================
     PAGE 4 - CELEBRATION
========================= -->
<section id="page4">

    <!-- BIRTHDAY MUSIC -->
    <audio id="bgMusic" src="audio/happy-birthday.mp3"></audio>

    <!-- MAIN IMAGE -->
    <img id="cakeImg"
         src="images/cake-candles-on.png"
         alt="cake">

    <!-- GUEST VIDEO -->
    <video id="guestVideo"
           style="display:none;"
           playsinline>
        <source src="videos/guest.mp4" type="video/mp4">
    </video>

    <!-- CAKE CUTTING VIDEO -->
    <video id="cakeCutVideo"
           style="display:none;"
           playsinline>
        <source src="videos/cake-cutting.mp4" type="video/mp4">
    </video>

    <!-- TEXT -->
    <p id="cakeText">
        Make a wish ❤️<br>
        Tap to blow the candles
    </p>

</section>

    <script src="script.js"></script>

</body>

</html>
