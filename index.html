<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Birthday Surprise ❤️</title>

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

    <!-- PAGE 1 -->

    <section id="page1">

        <div id="qrBox">

            <img src="images/qr.png"
                 id="qrImage">

            <div class="scan-line"></div>

        </div>

        <p class="tap-text">

            Tap

            <span id="scanLink"
                  onclick="showBirthday()">

                HERE

            </span>

            to Scan the QR

        </p>

    </section>

    <!-- PAGE 2 -->

    <section id="page2">

        <h1 id="birthdayText">

            🎉 HAPPY BIRTHDAY 🎉

        </h1>

        <img src="images/teddy-cake.png"
             id="teddyImage">

        <div id="questionSection">

            <p>

                Are you excited for what's next?

            </p>

            <div class="btn-container">

                <button id="yesBtn">

                    YES

                </button>

                <button id="noBtn">

                    NO

                </button>

            </div>

        </div>

    </section>

    <script src="script.js"></script>

</body>

</html>
